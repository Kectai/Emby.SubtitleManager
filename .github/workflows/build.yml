name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_NOLOGO: '1'
  DOTNET_VERSION: '8.0.x'
  PROJECT_FILE: Emby.SubtitleManager.csproj

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_FILE }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_FILE }} --configuration Release --no-restore

      - name: Verify plugin DLL
        run: test -f bin/Release/netstandard2.1/Emby.SubtitleManager.dll

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: Emby.SubtitleManager
          path: bin/Release/netstandard2.1/Emby.SubtitleManager.dll
          if-no-files-found: error
